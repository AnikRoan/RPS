spring.application.name=backRPS

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
jwt.secret.key=${JWT_SECRET_KEY}
access.token.expired=${ACCESS_TOKEN_EXPIRED}
refresh.token.expired=${REFRESH_TOKEN_EXPIRED}
token.enforce.limit=${TOKEN_ENFORCE_LIMIT}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.show-sql=true

spring.kafka.bootstrap-servers=${SPRING_KAFKA_SERVERS}

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.batch.size=32768
spring.kafka.producer.properties.linger.ms=5
spring.kafka.producer.properties.compression.type=snappy
spring.kafka.producer.properties.max.request.size=10485760

spring.kafka.template.default-topic=${SPRING_KAFKA_TOPIC}

spring.data.redis.host=${SPRING_DATA_REDIS_HOST}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT}

logging.level.org.springframework.kafka=INFO
logging.level.org.apache.kafka=INFO
logging.level.org.apache.kafka.clients.producer=INFO
logging.level.org.hibernate.engine.jdbc.batch.internal.BatchingBatch=INFO






